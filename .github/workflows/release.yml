# On push of tag v*: build Windows installer + portable exe and create GitHub Release with both attached.
name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - name: Install NSIS
        run: choco install nsis -y

      - run: npm ci
      - run: npm run tauri:build

      - name: Prepare release files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release
          $setup = Get-ChildItem "src-tauri/target/release/bundle/nsis/*.exe" | Select-Object -First 1
          Copy-Item $setup.FullName -Destination "release/AutoDarkMode-setup.exe"
          Copy-Item "src-tauri/target/release/windows-auto-dark-mode.exe" -Destination "release/AutoDarkMode-portable.exe"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          generate_release_notes: true
          files: |
            release/AutoDarkMode-setup.exe
            release/AutoDarkMode-portable.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
